name: Atualizar resultados da Copa

on:
  schedule:
    # 02:00 UTC = 23:00 horário de Brasília (UTC-3)
    - cron: '0 2 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Instalar dependências
        run: pip install -r agent/requirements.txt

      - name: Rodar agente
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          COMPETITION_CODE: ${{ vars.COMPETITION_CODE || 'WC' }}
        run: python agent/update_results.py
